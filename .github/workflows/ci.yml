name: Backend CI

on:
  push:
    branches:
      - "**"
    paths:
      - "src/**"
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "src/**"
      - "pom.xml"
      - "mvnw"
      - ".mvn/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin) + Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw -B -ntp clean verify

      - name: Upload Surefire/Failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: ignore

      - name: Upload coverage reports (if configured)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/site/jacoco/**
            target/jacoco.exec
          if-no-files-found: ignore

